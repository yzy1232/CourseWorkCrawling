<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>学在城院下载器</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --bg-strong: #eef3f7;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --line: #d7dee8;
      --line-strong: #b9c5d3;
      --ink: #17202a;
      --muted: #617083;
      --muted-strong: #435163;
      --brand: #126b7a;
      --brand-strong: #0b4f5b;
      --brand-soft: #e7f4f6;
      --blue: #255ca8;
      --blue-soft: #edf4ff;
      --ok: #16794c;
      --ok-soft: #e9f7ef;
      --warn: #9a5a00;
      --warn-soft: #fff4df;
      --danger: #b42318;
      --danger-soft: #fff0ee;
      --shadow: 0 14px 36px rgba(24, 34, 44, .08);
      --shadow-soft: 0 6px 18px rgba(24, 34, 44, .06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(231, 244, 246, .82) 0, rgba(245, 247, 250, 0) 300px),
        var(--bg);
      color: var(--ink);
      font: 14px/1.5 "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 0 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s ease, border-color .15s ease, color .15s ease, box-shadow .15s ease, transform .15s ease;
    }

    button:hover:not(:disabled) {
      border-color: var(--line-strong);
      background: var(--panel-soft);
      box-shadow: var(--shadow-soft);
      transform: translateY(-1px);
    }

    button.primary {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
    }

    button.primary:hover:not(:disabled) {
      border-color: var(--brand-strong);
      background: var(--brand-strong);
    }

    button.subtle {
      background: var(--panel-soft);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .54;
      transform: none;
      box-shadow: none;
    }

    input, select, textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 7px 10px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(18, 107, 122, .14);
    }

    input::placeholder, textarea::placeholder {
      color: #98a4b3;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted-strong);
      font-size: 12px;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--panel);
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f1f5f9;
      color: var(--muted-strong);
      font-size: 12px;
      font-weight: 800;
    }

    tbody tr {
      transition: background .15s ease;
    }

    tbody tr:not(.details-row) {
      animation: row-in .22s ease both;
    }

    tbody tr:hover td {
      background: #fbfdff;
    }

    tr.selected td {
      background: #edf8fa;
    }

    tr.selected:hover td {
      background: #e6f4f7;
    }

    @keyframes row-in {
      from { opacity: 0; transform: translateY(7px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .app {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      min-height: 100vh;
    }

    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login-card {
      width: min(430px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .94);
      box-shadow: var(--shadow);
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .login-head {
      display: grid;
      gap: 5px;
    }

    .login-head h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .login-head p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .login-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .course-home,
    .workspace-shell {
      min-height: 100vh;
      padding: 22px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
    }

    .workspace-shell {
      height: 100vh;
      overflow: hidden;
    }

    .course-home-head,
    .workspace-head {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .92);
      box-shadow: var(--shadow);
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .top-brand {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      min-width: 260px;
    }

    .top-title {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .top-title h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .top-title p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .head-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .course-grid {
      min-height: 0;
      overflow: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      align-content: start;
      gap: 12px;
    }

    .course-card {
      min-height: 138px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow-soft);
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: space-between;
      transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
    }

    .course-card:hover {
      border-color: var(--line-strong);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    .course-card-title {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .course-card-title strong {
      color: var(--ink);
      font-size: 15px;
      line-height: 1.35;
    }

    .course-card-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .workspace-body {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
      overflow: hidden;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      background: rgba(255, 255, 255, .92);
      border-right: 1px solid var(--line);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      backdrop-filter: blur(12px);
    }

    .brand {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      padding-bottom: 2px;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--brand), var(--blue));
      color: #fff;
      font-weight: 900;
      box-shadow: 0 8px 20px rgba(18, 107, 122, .24);
    }

    .brand h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .side-section {
      display: grid;
      gap: 12px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted-strong);
      font-size: 12px;
      font-weight: 800;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    .field-note {
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .row-check {
      width: 16px;
      min-height: 16px;
      accent-color: var(--brand);
      padding: 0;
    }

    .section-action {
      width: 100%;
    }

    .content {
      min-width: 0;
      height: 100vh;
      padding: 22px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
      overflow: hidden;
    }

    .toolbar {
      background: rgba(255, 255, 255, .9);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 13px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      backdrop-filter: blur(12px);
    }

    .tabs, .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tab {
      min-width: 84px;
      background: var(--panel-soft);
      font-weight: 800;
    }

    .tab.active {
      border-color: var(--brand);
      color: var(--brand-strong);
      background: var(--brand-soft);
      box-shadow: inset 0 0 0 1px rgba(18, 107, 122, .08);
    }

    .busy-state {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      max-width: min(460px, 100%);
      min-width: 0;
    }

    .busy-dot {
      width: 8px;
      min-width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 0 3px rgba(22, 121, 76, .12);
    }

    .busy-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .busy-state.active .busy-dot {
      background: var(--warn);
      box-shadow: 0 0 0 3px rgba(154, 90, 0, .14);
      animation: pulse 1s ease-in-out infinite;
    }

    .busy-state.error {
      color: var(--danger);
    }

    .busy-state.error .busy-dot {
      background: var(--danger);
      box-shadow: 0 0 0 3px rgba(180, 35, 24, .12);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: .75; }
      50% { transform: scale(1.28); opacity: 1; }
    }

    .loading-spinner {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--line);
      border-top-color: var(--brand);
      animation: spin .75s linear infinite;
      justify-self: center;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .download-status-icon {
      position: relative;
      width: 18px;
      min-width: 18px;
      height: 18px;
      border-radius: 50%;
      justify-self: center;
    }

    .download-status-icon.idle {
      opacity: 0;
    }

    .download-status-icon.pending {
      border: 2px solid var(--line-strong);
      background: #fff;
    }

    .download-status-icon.running {
      border: 2px solid var(--line);
      border-top-color: var(--brand);
      background: #fff;
      animation: spin .75s linear infinite;
    }

    .download-status-icon.done {
      background: var(--ok);
      box-shadow: 0 0 0 3px rgba(22, 121, 76, .12);
    }

    .download-status-icon.done::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 4px;
      width: 7px;
      height: 4px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg);
    }

    .download-status-icon.error {
      background: var(--danger);
      box-shadow: 0 0 0 3px rgba(180, 35, 24, .12);
    }

    .download-status-icon.error::before,
    .download-status-icon.error::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 8px;
      width: 8px;
      height: 2px;
      border-radius: 2px;
      background: #fff;
    }

    .download-status-icon.error::before {
      transform: rotate(45deg);
    }

    .download-status-icon.error::after {
      transform: rotate(-45deg);
    }

    .panel {
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .panel-head {
      min-height: 54px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      background: linear-gradient(180deg, #fff, #fbfcfe);
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .muted {
      color: var(--muted);
    }

    .panel-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .table-wrap {
      overflow: auto;
      min-height: 220px;
    }

    .title-cell {
      display: grid;
      gap: 4px;
      min-width: 220px;
    }

    .title-cell strong {
      color: var(--ink);
      font-size: 14px;
      line-height: 1.45;
    }

    .description {
      max-width: 760px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .courseware-title {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-width: 240px;
    }

    .courseware-title > .download-status-icon {
      margin-top: 6px;
    }

    .expand-btn {
      width: 30px;
      min-width: 30px;
      min-height: 30px;
      padding: 0;
      border-radius: 6px;
      font-weight: 900;
      line-height: 1;
    }

    .details-row td {
      background: #fbfdff;
      padding: 0;
    }

    .materials-panel {
      display: grid;
      gap: 14px;
      padding: 12px 14px 14px 62px;
      border-top: 1px solid rgba(215, 222, 232, .55);
    }

    .materials-group {
      display: grid;
      gap: 10px;
    }

    .materials-group + .materials-group {
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .materials-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .materials-list {
      display: grid;
      gap: 8px;
    }

    .material-item {
      display: grid;
      grid-template-columns: 20px 18px minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 8px 10px;
    }

    .material-item.pending,
    .material-item.running {
      border-color: #b9dbe2;
      background: #f4fbfc;
    }

    .material-item.done {
      border-color: #bfebd1;
      background: #f5fbf7;
    }

    .material-item.error {
      border-color: #f1b8b2;
      background: var(--danger-soft);
    }

    .material-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
    }

    .material-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .material-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .submit-layout {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(0, 1fr);
      gap: 0;
    }

    .submit-form {
      padding: 16px;
      border-right: 1px solid var(--line);
      display: grid;
      align-content: start;
      gap: 14px;
      background: #fbfdff;
      overflow: auto;
    }

    .file-picker {
      display: grid;
      gap: 10px;
      min-height: 132px;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
    }

    .file-list {
      display: grid;
      gap: 8px;
    }

    .file-chip {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel-soft);
      padding: 7px 9px;
    }

    .file-chip strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .submit-help {
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .homework-picker {
      min-height: 0;
      overflow: auto;
    }

    .empty {
      min-height: 260px;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    .empty-box {
      display: grid;
      gap: 7px;
      max-width: 360px;
    }

    .empty-title {
      color: var(--ink);
      font-size: 15px;
      font-weight: 800;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge-ok {
      border-color: #bfebd1;
      background: var(--ok-soft);
      color: var(--ok);
    }

    .badge-warn {
      border-color: #f3d39c;
      background: var(--warn-soft);
      color: var(--warn);
    }

    .badge-blue {
      border-color: #c9dcfb;
      background: var(--blue-soft);
      color: var(--blue);
    }

    .badge-neutral {
      border-color: var(--line);
      background: var(--panel-soft);
      color: var(--muted-strong);
    }

    @media (max-width: 1020px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .content {
        height: auto;
        min-height: calc(100vh - 1px);
        grid-template-rows: auto minmax(420px, 1fr);
        overflow: visible;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .submit-layout {
        grid-template-columns: 1fr;
      }

      .submit-form {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }

    @media (max-width: 620px) {
      .sidebar,
      .content {
        padding: 16px;
      }

      .brand {
        grid-template-columns: 40px minmax(0, 1fr);
      }

      .brand-mark {
        width: 40px;
        height: 40px;
      }

      .actions,
      .tabs {
        width: 100%;
      }

      .actions button,
      .tabs button {
        flex: 1 1 132px;
      }

      th, td {
        padding: 10px 11px;
      }

      .materials-panel {
        padding-left: 14px;
      }

      .material-item {
        grid-template-columns: 20px 18px minmax(0, 1fr);
        align-items: start;
      }

      .material-actions,
      .material-meta {
        grid-column: 3;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const h = React.createElement;
    const AUTH_COOKIE = "coursework_auth";

    function readAuthCookie() {
      const prefix = AUTH_COOKIE + "=";
      const part = document.cookie.split("; ").find(item => item.startsWith(prefix));
      if (!part) return null;
      try {
        return JSON.parse(decodeURIComponent(part.slice(prefix.length)));
      } catch (_) {
        return null;
      }
    }

    function writeAuthCookie(auth) {
      const value = encodeURIComponent(JSON.stringify(auth));
      document.cookie = AUTH_COOKIE + "=" + value + "; max-age=" + (30 * 24 * 60 * 60) + "; path=/; SameSite=Lax";
    }

    function clearAuthCookie() {
      document.cookie = AUTH_COOKIE + "=; max-age=0; path=/; SameSite=Lax";
    }

    function Badge({ tone, children }) {

    function formatSize(size) {
      const n = Number(size);
      if (!Number.isFinite(n) || n <= 0) return "大小未知";
      const units = ["B", "KB", "MB", "GB"];
      let value = n;
      let unit = 0;
      while (value >= 1024 && unit < units.length - 1) {
        value /= 1024;
        unit += 1;
      }
      return (unit === 0 ? value.toFixed(0) : value.toFixed(value >= 10 ? 1 : 2)) + " " + units[unit];
    }

    function MaskedPasswordInput({ value, onChange, placeholder }) {
      const inputRef = React.useRef(null);
      const masked = "*".repeat(value.length);

      function setCaret(pos) {
        requestAnimationFrame(() => {
          const el = inputRef.current;
          if (el) el.setSelectionRange(pos, pos);
        });
      }

      function replaceSelection(text) {
        const el = inputRef.current;
        const start = el ? el.selectionStart || 0 : value.length;
        const end = el ? el.selectionEnd || start : start;
        const next = value.slice(0, start) + text + value.slice(end);
        onChange(next);
        setCaret(start + text.length);
      }

      function removeSelection(backward) {
        const el = inputRef.current;
        const start = el ? el.selectionStart || 0 : value.length;
        const end = el ? el.selectionEnd || start : start;
        if (start !== end) {
          onChange(value.slice(0, start) + value.slice(end));
          setCaret(start);
          return;
        }
        if (backward && start > 0) {
          onChange(value.slice(0, start - 1) + value.slice(start));
          setCaret(start - 1);
        } else if (!backward && start < value.length) {
          onChange(value.slice(0, start) + value.slice(start + 1));
          setCaret(start);
        }
      }

      function handleKeyDown(e) {
        if (e.key === "Backspace") {
          e.preventDefault();
          removeSelection(true);
          return;
        }
        if (e.key === "Delete") {
          e.preventDefault();
          removeSelection(false);
          return;
        }
        if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
          e.preventDefault();
          replaceSelection(e.key);
        }
      }

      function handlePaste(e) {
        e.preventDefault();
        replaceSelection(e.clipboardData.getData("text"));
      }

      return h("input", {
        ref: inputRef,
        type: "text",
        value: masked,
        onKeyDown: handleKeyDown,
        onPaste: handlePaste,
        onChange: () => {},
        placeholder
      });
    }

    function materialKey(coursewareId, material, idx) {
      return String(coursewareId) + ":" + String(material.id || material.url || material.name || idx);
    }

    function assignmentKey(homeworkId, assignment, idx) {
      return String(homeworkId) + ":" + String(assignment.id || assignment.url || assignment.name || idx);
    }

    function submissionKey(homeworkId, submission, idx) {
      return String(homeworkId) + ":" + String(submission.id || submission.url || submission.name || idx);
    }

    function withProgressKey(item, key) {
      return { ...item, progress_key: key };
    }

    function downloadStatusForKey(statuses, key) {
      return (statuses[key] && statuses[key].status) || "idle";
    }

    function aggregateDownloadStatus(statuses, keys) {
      const values = keys.map(key => statuses[key] && statuses[key].status).filter(Boolean);
      if (values.includes("running")) return "running";
      if (values.includes("pending")) return "pending";
      if (values.includes("error")) return "error";
      if (values.includes("done")) return "done";
      return "idle";
    }

      async function streamOverview(path, extra, options) {
        const label = options.label;
        const kind = options.kind;
        let doneEvent = null;
        setBusy(true);
        setLoadingList(kind);
        setStatus({ tone: "neutral", text: "正在刷新" + label });
        try {
          const res = await fetch(path, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ...form, ...extra })
          });
          if (!res.ok) {
            const text = await res.text();
            let message = "请求失败";
            try {
              const data = JSON.parse(text);
              message = data.error || message;
            } catch (_) {
              message = text || message;
            }
            throw new Error(message);
          }
          if (!res.body) throw new Error("当前浏览器不支持流式读取");

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          function handleEvent(event) {
            if (!event || !event.type) return;
            if (event.type === "log") {
              setStatus({ tone: "neutral", text: event.message || ("正在刷新" + label) });
              return;
            }
            if (event.type === "start") {
              const total = Number(event.total) || 0;
              setStatus({ tone: "neutral", text: label + "列表已获取，共 " + total + " 个" });
              return;
            }
            if (event.type === "item") {
              options.onItem(event.record, event);
              const total = Number(event.total) || 0;
              const index = Number(event.index) || 0;
              setStatus({
                tone: "neutral",
                text: "正在刷新" + label + " " + index + (total ? "/" + total : "")
              });
              return;
            }
            if (event.type === "done") {
              doneEvent = event;
              return;
            }
            if (event.type === "error") {
              throw new Error(event.error || "刷新失败");
            }
          }

          function handleLine(line) {
            const trimmed = line.trim();
            if (!trimmed) return;
            handleEvent(JSON.parse(trimmed));
          }

          while (true) {
            const result = await reader.read();
            if (result.done) break;
            buffer += decoder.decode(result.value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";
            lines.forEach(handleLine);
          }
          buffer += decoder.decode();
          handleLine(buffer);

          if (!doneEvent) throw new Error("刷新中断");
          setStatus({
            tone: doneEvent.stale ? "neutral" : "ok",
            text: doneEvent.message || (label + "已刷新（" + (doneEvent.count || 0) + " 个）")
          });
          return doneEvent;
        } catch (err) {
          setStatus({ tone: "error", text: err.message });
          throw err;
        } finally {
          setBusy(false);
          setLoadingList(null);
        }
      }

      function filenameFromDisposition(header, fallback) {
        const value = header || "";
        const m = value.match(/filename="?([^";]+)"?/i);
        return m ? m[1] : fallback;
      }

      function triggerBrowserDownload(url, filename) {
        const a = document.createElement("a");
        a.href = url;
        a.download = filename || "download.zip";
        document.body.appendChild(a);
        a.click();
        a.remove();

      async function downloadZip(path, extra, fallbackName) {
        setBusy(true);
        setStatus({ tone: "neutral", text: "正在打包下载" });
        try {
          const res = await fetch(path, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ...form, ...extra })
          });
          if (!res.ok) {
            let message = "下载失败";
            try {
              const data = await res.json();
              message = data.error || message;
            } catch (_) {}
            throw new Error(message);
          }
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = filenameFromDisposition(res.headers.get("Content-Disposition"), fallbackName);
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 60 * 1000);
          setStatus({ tone: "ok", text: "已交给浏览器下载" });
        } catch (err) {
          setStatus({ tone: "error", text: err.message });
          throw err;
        } finally {
          setBusy(false);
        }
      }

      async function downloadZipStream(path, extra, fallbackName, label) {
        let doneEvent = null;
        setBusy(true);
        setDownloadStatuses({});
        setStatus({ tone: "neutral", text: "正在整理下载列表" });
        try {
          const res = await fetch(path, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ...form, ...extra })
          });
          if (!res.ok) {
            let message = "下载失败";
            const text = await res.text();
            try {
              const data = JSON.parse(text);
              message = data.error || message;
            } catch (_) {
              message = text || message;
            }
            throw new Error(message);
          }
          if (!res.body) throw new Error("当前浏览器不支持流式读取");

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          function setFileStatus(event, nextStatus, error) {
            if (!event.progress_key) return;
            setDownloadStatuses(prev => ({
              ...prev,
              [event.progress_key]: {
                status: nextStatus,
                error: error || ""
              }
            }));
          }

          function handleEvent(event) {
            if (!event || !event.type) return;
            if (event.type === "log") {
              const message = event.message || "正在整理下载列表";
              setStatus({ tone: "neutral", text: message });
              return;
            }
            if (event.type === "start") {
              const files = event.files || [];
              const pending = {};
              files.forEach(file => {
                if (file.progress_key) pending[file.progress_key] = { status: "pending", error: "" };
              });
              setDownloadStatuses(pending);
              setStatus({ tone: "neutral", text: label + "开始下载，共 " + files.length + " 个文件" });
              return;
            }
            if (event.type === "file_start") {
              setFileStatus(event, "running", "");
              setStatus({
                tone: "neutral",
                text: "正在下载 " + (event.index || "") + (event.total ? "/" + event.total : "") + "：" + (event.name || "")
              });
              return;
            }
            if (event.type === "file_done") {
              setFileStatus(event, "done", "");
              setStatus({
                tone: "neutral",
                text: "已下载 " + (event.index || "") + (event.total ? "/" + event.total : "")
              });
              return;
            }
            if (event.type === "file_error") {
              setFileStatus(event, "error", event.error || "下载失败");
              setStatus({ tone: "neutral", text: "部分文件下载失败，继续处理剩余文件" });
              return;
            }
            if (event.type === "done") {
              doneEvent = event;
              return;
            }
            if (event.type === "error") {
              throw new Error(event.error || "下载失败");
            }
          }

          function handleLine(line) {
            const trimmed = line.trim();
            if (!trimmed) return;
            handleEvent(JSON.parse(trimmed));
          }

          while (true) {
            const result = await reader.read();
            if (result.done) break;
            buffer += decoder.decode(result.value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";
            lines.forEach(handleLine);
          }
          buffer += decoder.decode();
          handleLine(buffer);

          if (!doneEvent) throw new Error("下载中断");
          if (doneEvent.url) {
            triggerBrowserDownload(doneEvent.url, doneEvent.filename || fallbackName);
          }
          const failures = (doneEvent.failures || []).length;
          setStatus({
            tone: failures ? "neutral" : "ok",
            text: failures ? "已生成 ZIP，" + failures + " 个文件失败" : "已交给浏览器下载"
          });
        } catch (err) {
          setStatus({ tone: "error", text: err.message });
          throw err;
        } finally {
          setBusy(false);
        }
      }

      function cacheStatus(data, label) {
        if (!data.cached_at) return label + "缓存不可用";
        return label + "缓存已读取" + (data.stale ? "（可能已过期）" : "");
      }

      async function loadCourses(refresh, override) {

      async function loadHomeworks(refresh, override) {
        if (refresh) {

          await streamOverview(

            }

        setSelectedSubmissions(new Set());

      async function loadCoursewares(refresh, override) {
        if (refresh) {
          setCoursewares([]);
          setSelected(new Set());
          setSelectedMaterials(new Set());
          setTab("coursewares");
          await streamOverview(
            "/api/coursewares/stream",

              kind: "coursewares",
              label: "课件",
              onItem: record => setCoursewares(prev => [...prev, record])
            }
          );

        }
        const data = await api("/api/coursewares", { ...(override || {}), refresh });
        setCoursewares(data.coursewares || []);
        setSelected(new Set());
        setSelectedMaterials(new Set());
        setTab("coursewares");
        setStatus({ tone: data.stale ? "neutral" : "ok", text: refresh ? "课件已刷新" : cacheStatus(data, "课件") });
      }

      function selectedHomeworkRecordsForDownload() {
        return homeworks.map(row => {
          const homeworkSelected = selectedHomeworks.has(String(row.id));
          const assignment = homeworkSelected
            ? (row.assignment || []).map((item, idx) => withProgressKey(item, assignmentKey(row.id, item, idx)))
            : (row.assignment || [])
              .map((item, idx) => ({ item, key: assignmentKey(row.id, item, idx) }))
              .filter(entry => selectedAssignments.has(entry.key))
              .map(entry => withProgressKey(entry.item, entry.key));
          const submission = homeworkSelected
            ? (row.submission || []).map((item, idx) => withProgressKey(item, submissionKey(row.id, item, idx)))
            : (row.submission || [])
              .map((item, idx) => ({ item, key: submissionKey(row.id, item, idx) }))
              .filter(entry => selectedSubmissions.has(entry.key))
              .map(entry => withProgressKey(entry.item, entry.key));
          if (!homeworkSelected && assignment.length === 0 && submission.length === 0) return null;
          return { id: row.id, title: row.title, assignment, submission };
        }).filter(Boolean);
      }

      function selectedCoursewareRecordsForDownload() {
        return coursewares.map(row => {
          const coursewareSelected = selected.has(String(row.id));
          const materials = coursewareSelected
            ? (row.materials || []).map((item, idx) => withProgressKey(item, materialKey(row.id, item, idx)))
            : (row.materials || [])
              .map((item, idx) => ({ item, key: materialKey(row.id, item, idx) }))
              .filter(entry => selectedMaterials.has(entry.key))
              .map(entry => withProgressKey(entry.item, entry.key));
          if (!coursewareSelected && materials.length === 0) return null;
          return { id: row.id, title: row.title, materials };
        }).filter(Boolean);
      }

      function allHomeworkRecordsForDownload() {
        return homeworks.map(row => ({
          id: row.id,
          title: row.title,
          assignment: (row.assignment || []).map((item, idx) => withProgressKey(item, assignmentKey(row.id, item, idx))),
          submission: (row.submission || []).map((item, idx) => withProgressKey(item, submissionKey(row.id, item, idx)))
        }));
      }

      function allCoursewareRecordsForDownload() {
        return coursewares.map(row => ({
          id: row.id,
          title: row.title,
          materials: (row.materials || []).map((item, idx) => withProgressKey(item, materialKey(row.id, item, idx)))
        }));
      }

      async function downloadHomeworks(onlySelected) {
        const ids = onlySelected ? Array.from(selectedHomeworks) : [];
        const assignmentIds = onlySelected ? Array.from(selectedAssignments) : [];
        const submissionIds = onlySelected ? Array.from(selectedSubmissions) : [];
        if (onlySelected && ids.length === 0 && assignmentIds.length === 0 && submissionIds.length === 0) {
          setStatus({ tone: "error", text: "请先勾选要下载的作业或附件" });
          return;
        }
        await downloadZipStream("/api/download/homeworks/stream", {
          selected_homework_ids: ids,
          selected_assignment_ids: assignmentIds,
          selected_submission_ids: submissionIds,
          records: onlySelected
            ? selectedHomeworkRecordsForDownload()
            : (homeworks.length ? allHomeworkRecordsForDownload() : undefined)
        }, "homeworks.zip", "作业附件下载");
        if (!onlySelected) {
          setSelectedHomeworks(new Set());
          setSelectedAssignments(new Set());
          setSelectedSubmissions(new Set());
        }
      }

      async function downloadCoursewares(onlySelected) {
        const ids = onlySelected ? Array.from(selected) : [];
        const materialIds = onlySelected ? Array.from(selectedMaterials) : [];
        if (onlySelected && ids.length === 0 && materialIds.length === 0) {
          setStatus({ tone: "error", text: "请先勾选要下载的课件或附件" });
          return;
        }
        await downloadZipStream("/api/download/coursewares/stream", {
          selected_ids: ids,
          selected_material_ids: materialIds,
          records: onlySelected ? selectedCoursewareRecordsForDownload() : allCoursewareRecordsForDownload()
        }, "coursewares.zip", "课件附件下载");
        if (!onlySelected) {
          setSelectedMaterials(new Set());
        }
      }

      async function submitHomework({ homeworkId, files, comment }) {
        const target = String(homeworkId || "").trim();
        if (!target) {
          setStatus({ tone: "error", text: "请先填写作业 ID" });
          return;
        }
        if (!files || files.length === 0) {
          setStatus({ tone: "error", text: "请先选择要上传的文件" });
          return;
        }
        const names = Array.from(files).map(file => file.name).join("\n");
        const ok = window.confirm(
          "即将向作业 " + target + " 提交以下文件：\n" +
          names +
          "\n\n此操作会真实改变服务器上的提交状态，不可自动撤销。确认提交？"
        );
        if (!ok) {
          setStatus({ tone: "neutral", text: "已取消提交" });
          return;
        }

        setBusy(true);
        setStatus({ tone: "neutral", text: "正在上传并提交" });
        try {
          const payload = new FormData();
          payload.append("username", form.username);
          payload.append("password", form.password);
          payload.append("homework_id", target);
          payload.append("comment", comment || "");
          payload.append("confirm", "1");
          Array.from(files).forEach(file => payload.append("files", file, file.name));
          const res = await fetch("/api/submit/homework", {
            method: "POST",
            body: payload
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "提交失败");
          try {
            await loadHomeworks(true);
          } catch (_) {}
          setStatus({ tone: "ok", text: "已提交 " + (data.submitted_count || 0) + " 个附件" });
          setSubmitTarget(target);
          setTab("submit");
          return data;
        } catch (err) {
          setStatus({ tone: "error", text: err.message });
          throw err;
        } finally {
          setBusy(false);
        }
      }

      const selectedCount = selected.size;
      const selectedMaterialCount = selectedMaterials.size;
      const selectedHomeworkCount = selectedHomeworks.size;
      const selectedAssignmentCount = selectedAssignments.size;

        ),

              )
            ),
            h("div", { className: "actions" },

                h("button", { onClick: selectAllCoursewares, disabled: busy || !coursewares.length }, "全选"),

                h("button", { onClick: () => downloadCoursewares(true), disabled: busy || (!selectedCount && !selectedMaterialCount), className: "primary" }, "下载选中"),

                h("button", { onClick: () => downloadHomeworks(false), disabled: busy || !form.course_id }, "下载全部")
              ),

        });

        setExpanded(prev => {
          const key = String(id);
          const next = new Set(prev);
          if (next.has(key)) next.delete(key);

              : h(EmptyState, { title: "暂无作业数据" }, "刷新作业后可查看题目附件和提交状态。")
            : h("table", null,
              h("thead", null, h("tr", null,
                h("th", { style: { width: "48px" } }, ""),
                h("th", null, "标题"),
                h("th", { style: { width: "96px" } }, "已提交"),
                h("th", { style: { width: "160px" } }, "截止"),
                h("th", { style: { width: "96px" } }, "题目附件"),
                h("th", { style: { width: "96px" } }, "我的提交"),
                h("th", { style: { width: "92px" } }, "操作")
              )),
              h("tbody", null, rows.map(row => {
                const status = row.status || {};
                const isSelected = selectedHomeworks.has(String(row.id));
                const isExpanded = expanded.has(String(row.id));
                const rowDownloadStatus = aggregateDownloadStatus(
                  downloadStatuses,
                  [
                    ...(row.assignment || []).map((item, idx) => assignmentKey(row.id, item, idx)),
                    ...(row.submission || []).map((item, idx) => submissionKey(row.id, item, idx))
                  ]
                );
                return h(React.Fragment, { key: row.id },
                  h("tr", { className: isSelected ? "selected" : "" },
                    h("td", null,
                      h("input", {
                        className: "row-check",
                        type: "checkbox",
                        checked: isSelected,
                        onChange: () => onToggle(row.id)
                      })
                    ),
                    h("td", null,
                      h("div", { className: "courseware-title" },
                        h(DownloadStatusIcon, { status: rowDownloadStatus }),
                        h("button", {
                          className: "expand-btn",
                          type: "button",
                          onClick: () => toggleExpanded(row.id),
                          title: isExpanded ? "收起附件" : "展开附件",
                          "aria-expanded": isExpanded
                        }, isExpanded ? "−" : "+"),
                        h("div", { className: "title-cell" }, h("strong", null, row.title))
                      )
                    ),
                    h("td", null, status.submitted ? h(Badge, { tone: "ok" }, "是") : h(Badge, { tone: "warn" }, "否")),
                    h("td", null, status.deadline || "-"),
                    h("td", null, h(Badge, { tone: "neutral" }, (row.assignment || []).length)),
                    h("td", null, h(Badge, { tone: "neutral" }, (row.submission || []).length)),
                    h("td", null,
                      h("button", {
                        type: "button",
                        onClick: () => onSubmitHomework(row.id)
                      }, "提交")
                    )
                  ),
                  isExpanded ? h("tr", { className: "details-row" },
                    h("td", { colSpan: 7 },
                      h(HomeworkFilesPanel, {
                        homeworkId: row.id,
                        assignments: row.assignment || [],
                        submissions: row.submission || [],
                        selectedAssignments,
                        selectedSubmissions,
                        downloadStatuses,
                        onToggleAssignment,
                        onSelectAssignments,
                        onClearAssignments,
                        onToggleSubmission,
                        onSelectSubmissions,
                        onClearSubmissions
                      })
                    )
                  ) : null
                );
              }))
            )
        )
      );
    }

    function HomeworkFilesPanel({
      homeworkId,
      assignments,
      submissions,
      selectedAssignments,
      selectedSubmissions,
      downloadStatuses,
      onToggleAssignment,
      onSelectAssignments,
      onClearAssignments,
      onToggleSubmission,
      onSelectSubmissions,
      onClearSubmissions
    }) {
      return h("div", { className: "materials-panel" },
        h(FileGroup, {
          title: "题目附件",
          empty: "这个作业没有检测到题目附件。",
          files: assignments,
          selected: selectedAssignments,
          getKey: assignmentKey,
          homeworkId,
          downloadStatuses,
          onToggle: onToggleAssignment,
          onSelect: onSelectAssignments,
          onClear: onClearAssignments
        }),
        h(FileGroup, {
          title: "我的提交",
          empty: "这个作业没有检测到我的提交。",
          files: submissions,
          selected: selectedSubmissions,
          getKey: submissionKey,
          homeworkId,
          downloadStatuses,
          onToggle: onToggleSubmission,
          onSelect: onSelectSubmissions,
          onClear: onClearSubmissions
        })
      );
    }

    function SubmitPanel({ rows, targetId, onTargetChange, onSubmit, onRefresh, busy }) {
      const [files, setFiles] = React.useState([]);
      const [comment, setComment] = React.useState("");
      const fileInputRef = React.useRef(null);
      const selectedRow = rows.find(row => String(row.id) === String(targetId));
      const totalSize = files.reduce((sum, file) => sum + (Number(file.size) || 0), 0);

      function chooseFiles(e) {
        setFiles(Array.from(e.target.files || []));
      }

      function clearFiles() {
        setFiles([]);
        if (fileInputRef.current) fileInputRef.current.value = "";
      }

      async function handleSubmit(e) {
        e.preventDefault();
        const data = await onSubmit({ homeworkId: targetId, files, comment });
        if (data) {
          clearFiles();
          setComment("");
        }
      }

      return h("section", { className: "panel" },
        h("div", { className: "panel-head" },
          h("div", { className: "panel-title" },
            h("h2", null, "上传作业"),
            h(Badge, { tone: selectedRow ? "ok" : "neutral" }, selectedRow ? "已选择" : "待选择")
          ),
          h("span", { className: "panel-meta" }, files.length + " 个文件，" + formatSize(totalSize))
        ),
        h("div", { className: "submit-layout" },
          h("form", { className: "submit-form", onSubmit: handleSubmit },
            h("label", null, "作业 ID",
              h("input", {
                value: targetId,
                onChange: e => onTargetChange(e.target.value),
                placeholder: "从右侧选择或手动输入作业 ID"
              })
            ),
            selectedRow ? h("div", { className: "submit-help" },
              "当前作业：" + selectedRow.title
            ) : h("div", { className: "submit-help" },
              "作业 ID 可以在作业列表中点击“提交”自动填入。"
            ),
            h("label", null, "说明",
              h("textarea", {
                value: comment,
                onChange: e => setComment(e.target.value),
                placeholder: "可选"
              })
            ),
            h("div", { className: "file-picker" },
              h("label", null, "文件",
                h("input", {
                  ref: fileInputRef,
                  type: "file",
                  multiple: true,
                  onChange: chooseFiles
                })
              ),
              files.length === 0
                ? h("div", { className: "submit-help" }, "未选择文件。")
                : h("div", { className: "file-list" },
                  files.map((file, idx) => h("div", { className: "file-chip", key: file.name + ":" + idx },
                    h("strong", { title: file.name }, file.name),
                    h("span", { className: "material-meta" }, formatSize(file.size))
                  ))
                )
            ),
            h("div", { className: "material-actions" },
              h("button", {
                type: "submit",
                className: "primary",
                disabled: busy || !String(targetId || "").trim() || files.length === 0
              }, "提交作业"),
              h("button", {
                type: "button",
                onClick: clearFiles,
                disabled: busy || files.length === 0
              }, "清空文件")
            ),
            h("div", { className: "submit-help" }, "提交会真实写入 TronClass，并可能覆盖或追加到平台上的提交记录。")
          ),
          h("div", { className: "homework-picker" },
            rows.length === 0
              ? h(EmptyState, { title: "暂无作业数据" },
                h("button", {
                  type: "button",
                  onClick: onRefresh,
                  disabled: busy
                }, "刷新作业")
              )
              : h("table", null,
                h("thead", null, h("tr", null,
                  h("th", null, "作业"),
                  h("th", { style: { width: "96px" } }, "已提交"),
                  h("th", { style: { width: "160px" } }, "截止"),
                  h("th", { style: { width: "92px" } }, "选择")
                )),
                h("tbody", null, rows.map(row => {
                  const status = row.status || {};
                  const active = String(row.id) === String(targetId);
                  return h("tr", { key: row.id, className: active ? "selected" : "" },
                    h("td", null,
                      h("div", { className: "title-cell" },
                        h("strong", null, row.title),
                        h("div", { className: "description" }, "ID " + row.id)
                      )
                    ),
                    h("td", null, status.submitted ? h(Badge, { tone: "ok" }, "是") : h(Badge, { tone: "warn" }, "否")),
                    h("td", null, status.deadline || "-"),
                    h("td", null,
                      h("button", {
                        type: "button",
                        onClick: () => onTargetChange(String(row.id)),
                        disabled: active
                      }, active ? "已选" : "选择")
                    )
                  );
                }))
              )
          )
        )
      );
    }

    function FileGroup({ title, empty, files, selected, getKey, homeworkId, downloadStatuses, onToggle, onSelect, onClear }) {
      const available = files.filter(file => file.dest_dir !== null).length;
      const selectedCount = files.filter((file, idx) => selected.has(getKey(homeworkId, file, idx))).length;
      return h("div", { className: "materials-group" },
        h("div", { className: "materials-head" },
          h("span", null, title),
          h("div", { className: "material-actions" },
            h("span", null, "已选 " + selectedCount + " 个，" + available + " 个可下载 / " + files.length + " 个总计"),
            h("button", {
              type: "button",
              onClick: () => onSelect(homeworkId, files),
              disabled: available === 0 || selectedCount === available
            }, "全选附件"),
            h("button", {
              type: "button",
              onClick: () => onClear(homeworkId, files),
              disabled: selectedCount === 0
            }, "清空附件")
          )
        ),
        files.length === 0
          ? h("div", { className: "muted" }, empty)
          : h("div", { className: "materials-list" },
            files.map((file, idx) => {
              const skipped = file.dest_dir === null;
              const key = getKey(homeworkId, file, idx);
              const checked = selected.has(key);
              const itemStatus = downloadStatusForKey(downloadStatuses, key);
              return h("div", { className: "material-item " + itemStatus, key: String(file.id || file.url || idx) },
                h(DownloadStatusIcon, { status: itemStatus }),
                h("input", {
                  className: "row-check",
                  type: "checkbox",
                  checked,
                  disabled: skipped,
                  onChange: () => onToggle(homeworkId, file, idx),
                  title: skipped ? "该附件不可下载" : "选择这个附件"
                }),
                h("div", { className: "material-name", title: file.name || "未命名附件" }, file.name || "未命名附件"),
                h("div", { className: "material-meta" }, formatSize(file.size)),
                skipped ? h(Badge, { tone: "warn" }, "跳过") :
                file.saved_path ? h(Badge, { tone: "ok" }, "已保存") :
                h(Badge, { tone: "ok" }, "可下载")
              );
            })
          )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
